<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Sales & Customer Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #222; }
  h1 { text-align: center; color: #1a1a2e; }
  .summary-cards { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .card { background: white; border-radius: 10px; padding: 20px 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; min-width: 150px; }
  .card h2 { margin: 0; font-size: 28px; color: #16213e; }
  .card p { margin: 5px 0 0; color: #666; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
  .chart-box { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 150px; }
  .ai-box { max-width: 1000px; margin: 20px auto 0; background: #1a1a2e; color: #f4f6f8; border-radius: 10px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .ai-box h3 { margin-top: 0; color: #ffd166; }
  .ai-box p { line-height: 1.6; font-size: 15px; }
  .loading { opacity: 0.6; font-style: italic; }
  .error-msg { color: #c0392b; font-style: italic; text-align: center; }
  #connection-banner { display: none; max-width: 1000px; margin: 0 auto 20px; background: #fff3cd; color: #856404; border: 1px solid #ffeeba; border-radius: 8px; padding: 12px 20px; text-align: center; }
  .upload-box { max-width: 1000px; margin: 0 auto 20px; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
  .upload-box input[type="file"] { flex: 1; }
  .upload-box button, .ask-box button {
    background: #1a1a2e; color: white; border: none; padding: 10px 20px;
    border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  .upload-box button:hover, .ask-box button:hover { background: #16213e; }
  #upload-status { font-size: 14px; color: #555; width: 100%; }
  .ask-box { max-width: 1000px; margin: 0 auto 20px; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .ask-box textarea { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 14px; resize: vertical; }
  #ask-answer { margin-top: 15px; padding: 15px; background: #f4f6f8; border-radius: 6px; display: none; line-height: 1.5; }
</style>
</head>
<body>

<h1>AI Sales & Customer Intelligence Dashboard</h1>

<div id="connection-banner">⚠️ Can't reach the backend server. Is Flask running on port 5000?</div>

<div class="upload-box">
  <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
  <button onclick="uploadFile()">Upload & Analyze</button>
  <div id="upload-status"></div>
</div>

<div class="summary-cards">
  <div class="card"><h2 id="total-revenue">--</h2><p id="revenue-label">Total Amount</p></div>
  <div class="card"><h2 id="total-orders">--</h2><p>Total Rows</p></div>
  <div class="card"><h2 id="unique-customers">--</h2><p id="unique-label">Unique Count</p></div>
</div>

<div class="charts" id="chartsContainer"></div>

<div class="ai-box">
  <h3>🤖 AI Business Insight</h3>
  <p id="ai-summary-text" class="loading">Thinking about your data...</p>
</div>

<div class="ask-box">
  <strong>Ask a question about your data:</strong>
  <br><br>
  <textarea id="askInput" rows="2" placeholder="e.g. Which region should I focus my marketing on, and why?"></textarea>
  <br><br>
  <button onclick="askQuestion()">Ask</button>
  <div id="ask-answer"></div>
</div>

<script>
const API_BASE = "http://127.0.0.1:5000";
let chartInstances = {};

function showConnectionBanner() {
  document.getElementById("connection-banner").style.display = "block";
}
function hideConnectionBanner() {
  document.getElementById("connection-banner").style.display = "none";
}

async function loadSummary() {
  try {
    const res = await fetch(`${API_BASE}/api/summary`);
    if (!res.ok) throw new Error("Bad response");
    const data = await res.json();
    document.getElementById("total-revenue").innerText = data.total_amount.toLocaleString();
    document.getElementById("revenue-label").innerText = "Total " + data.amount_column_used;
    document.getElementById("total-orders").innerText = data.total_rows;
    if (data.unique_count !== undefined) {
      document.getElementById("unique-customers").innerText = data.unique_count;
      document.getElementById("unique-label").innerText = "Unique " + data.unique_count_label;
    }
    hideConnectionBanner();
  } catch (err) {
    showConnectionBanner();
  }
}

async function loadCharts() {
  const container = document.getElementById("chartsContainer");
  container.innerHTML = "";
  Object.keys(chartInstances).forEach(k => chartInstances[k].destroy());
  chartInstances = {};

  try {
    const res = await fetch(`${API_BASE}/api/breakdowns`);
    if (!res.ok) throw new Error("Bad response");
    const data = await res.json();

    const colors = ["#4e79a7", "#59a14f", "#e15759", "#f28e2b", "#b07aa1", "#76b7b2"];
    let i = 0;
    for (const [colName, values] of Object.entries(data)) {
      const box = document.createElement("div");
      box.className = "chart-box";
      const canvas = document.createElement("canvas");
      canvas.id = "chart_" + colName;
      box.appendChild(canvas);
      container.appendChild(box);

      chartInstances[colName] = new Chart(canvas, {
        type: "bar",
        data: {
          labels: Object.keys(values),
          datasets: [{ label: colName, data: Object.values(values), backgroundColor: colors[i % colors.length] }]
        },
        options: { plugins: { title: { display: true, text: "By " + colName } } }
      });
      i++;
    }
    hideConnectionBanner();
  } catch (err) {
    showConnectionBanner();
    container.innerHTML = `<p class="error-msg">Couldn't load charts — backend unreachable.</p>`;
  }
}

async function loadAISummary() {
  const el = document.getElementById("ai-summary-text");
  el.innerText = "Thinking about your data...";
  el.classList.add("loading");
  try {
    const res = await fetch(`${API_BASE}/api/ai-summary`);
    const data = await res.json();
    if (data.summary) {
      el.innerText = data.summary;
      el.classList.remove("loading");
    } else {
      el.innerText = "AI summary unavailable: " + (data.error || "unknown error");
    }
  } catch (err) {
    el.innerText = "Could not reach AI summary endpoint.";
  }
}

async function uploadFile() {
  const input = document.getElementById("fileInput");
  const status = document.getElementById("upload-status");
  if (!input.files.length) {
    status.innerText = "Please choose a file first.";
    return;
  }
  const formData = new FormData();
  formData.append("file", input.files[0]);
  status.innerText = "Uploading and analyzing...";

  try {
    const res = await fetch(`${API_BASE}/api/upload`, { method: "POST", body: formData });
    const data = await res.json();
    if (res.ok) {
      status.innerText = `✅ ${data.rows} rows loaded. Detected amount column: "${data.detected_amount_column}", categories: ${data.detected_categories.join(", ")}`;
      loadSummary();
      loadCharts();
      loadAISummary();
    } else {
      status.innerText = "❌ " + (data.error || "Upload failed");
    }
  } catch (err) {
    status.innerText = "❌ Could not reach server.";
  }
}

async function askQuestion() {
  const question = document.getElementById("askInput").value.trim();
  const answerBox = document.getElementById("ask-answer");
  if (!question) return;

  answerBox.style.display = "block";
  answerBox.innerText = "Thinking...";

  try {
    const res = await fetch(`${API_BASE}/api/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    answerBox.innerText = data.answer || ("Error: " + (data.error || "unknown"));
  } catch (err) {
    answerBox.innerText = "Could not reach server.";
  }
}

loadSummary();
loadCharts();
loadAISummary();
</script>

</body>
</html>
